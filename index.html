<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AIみうの公式ゲームポータル — MIU BLOCKS、MIU POPS、MIU BREAKERをプレイしよう！"
    />
    <meta name="theme-color" content="#ff1493" />
    <title>MIU GAMES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=9" />
  </head>
  <body>
    <canvas id="particles" aria-hidden="true"></canvas>
    <div class="decorations" aria-hidden="true">
      <div class="decor decor--game-icon decor--game-1">🎮</div>
      <div class="decor decor--game-icon decor--game-2">🕹️</div>
      <div class="decor decor--game-icon decor--game-3">⭐</div>
      <div class="decor decor--game-icon decor--game-4">👾</div>
      <div class="decor decor--block decor--block-1"></div>
      <div class="decor decor--block decor--block-2"></div>
      <div class="decor decor--block decor--block-3"></div>
      <div class="decor decor--block decor--block-4"></div>
      <div class="decor decor--controller"></div>
      <div class="decor decor--neon-heart decor--neon-heart-1">
        <span class="decor__heart-inner">♥</span>
      </div>
      <div class="decor decor--neon-heart decor--neon-heart-2">
        <span class="decor__heart-inner">♥</span>
      </div>
      <div class="decor decor--neon-heart decor--neon-heart-3">
        <span class="decor__heart-inner">♥</span>
      </div>
      <div class="decor decor--neon-heart decor--neon-heart-4">
        <span class="decor__heart-inner">♥</span>
      </div>
      <div class="decor decor--sakura decor--sakura-1"></div>
      <div class="decor decor--sakura decor--sakura-2"></div>
      <div class="decor decor--sakura decor--sakura-3"></div>
    </div>

    <div class="page">
      <header class="hero fade-in">
        <p class="hero__badge">✦ OFFICIAL PORTAL ✦</p>

        <h1 class="hero__logo">
          <span class="hero__logo-miu">MIU</span>
          <span class="hero__logo-games">GAMES</span>
        </h1>

        <div class="hero__title-wrap">
          <div class="hero__title-glow"></div>
          <img
            id="title-img"
            class="hero__title-img"
            src="title.png"
            alt="AIみう"
          />
        </div>

        <p id="tagline" class="hero__tagline"></p>
      </header>

      <main class="fade-in fade-in--delay-1">
        <section class="games" aria-labelledby="games-heading">
          <h2 id="games-heading" class="section-title">
            <span class="section-title__line"></span>
            <span class="section-title__text">GAME LIST</span>
            <span class="section-title__line"></span>
          </h2>
          <div id="game-list" class="game-list"></div>
        </section>
      </main>

      <footer class="footer fade-in fade-in--delay-2">
        <p class="footer__label">♡ CONNECT WITH MIU ♡</p>
        <nav id="social-links" class="social-links" aria-label="SNSリンク"></nav>
        <p class="footer__copy">&copy; AI MIU OFFICIAL PORTAL</p>
      </footer>
    </div>

    <script src="script.js?v=5"></script>
  </body>
</html>
